name: Build Lambda Artifact

on:
  push:
    branches:
      - dev
      - stage
      - main
    paths:
      - "lambda/**"

  workflow_dispatch:

permissions:
  contents: read
  id-token: write


jobs:

  build-lambda:

    runs-on: ubuntu-latest

    environment: ${{ github.ref_name == 'main' && 'prod' || github.ref_name }}

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"


      - name: build lambda package
        run: |
          rm -rf lambda/package/*
          pip install -r lambda/requirements.txt -t lambda/package
          cp -r lambda/*.py lambda/package/


      - name: Create Lambda zip
        run: |
          cd lambda/package
          zip -r ../lambda.zip .


      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_PIPELINE_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}


      - name: Upload artifact to S3
        run: |
           ENV_NAME=${{ github.ref_name == 'main' && 'prod' || github.ref_name }}
           aws s3 cp lambda/lambda.zip \
           s3://${{ vars.LAMBDA_ARTIFACT_BUCKET }}/${ENV_NAME}/${{ github.sha }}.zip